syntax = "proto3";

option go_package = "./gen;auth_pb";

message SignUpResponse {
    int32 id = 1;
    string email = 2;
    string hash = 3;
}

message ValidateResponse {
    int32 id = 1;
    string role = 2;
}

message RefreshResponse {
    string accessToken = 1;
}

message LoginResponse {
    string accessToken = 1;
    string refreshToken = 2;
}